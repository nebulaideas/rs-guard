# Repository-level Codecov configuration for rs-guard.
# Validated via: curl --data-binary @codecov.yml https://codecov.io/validate
#
# Note: upload tokens belong in GitHub Actions secrets (CODECOV_TOKEN), not here.

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "tests/**"
  - "benches/**"
  - "examples/**"
  - "scripts/**"