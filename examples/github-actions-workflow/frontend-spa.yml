name: AI Code Review (Frontend / SPA)

# Agnostic frontend and SPA workflow.
# Triggers on PRs that touch client-side source, config, or package manifests.
#
# ## Customize path filters
# Adjust the paths below to match your project's directory layout.
# GitHub Actions path filters use minimatch (no brace expansion — each glob is a separate entry).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'components/**'
      - 'pages/**'
      - 'app/**'
      - 'hooks/**'
      - 'stores/**'
      - 'styles/**'
      - 'public/**'
      - '*.config.ts'
      - '*.config.js'
      - '*.config.mjs'
      - 'tsconfig*.json'
      - 'package*.json'
      # If your project uses Tailwind or PostCSS, restore these:
      # - 'tailwind.config.*'
      # - 'postcss.config.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Pinned from actions/checkout@v5 (93cb6efe) to avoid Node.js 20 deprecation.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # Download rs-guard v1.4.0 and verify its SHA-256.
      - name: Download rs-guard
        run: |
          set -euo pipefail
          VERSION="v1.4.0"
          BINARY="rs-guard-x86_64-unknown-linux-gnu"
          curl -L --fail -o "${BINARY}" \
            "https://github.com/nebulaideas/rs-guard/releases/download/${VERSION}/${BINARY}"
          curl -L --fail -o "${BINARY}.sha256" \
            "https://github.com/nebulaideas/rs-guard/releases/download/${VERSION}/${BINARY}.sha256"
          sha256sum -c "${BINARY}.sha256"
          chmod +x "${BINARY}"
          mv "${BINARY}" rs-guard

      # Use the frontend/SPA prompt for deeper domain context.
      # Copy examples/prompts/frontend-spa.md to .github/review-prompt.md in your repo,
      # then customize the "## Project-Specific Focus" section for your framework.
      - name: AI Code Review
        run: ./rs-guard --prompt-file .github/review-prompt.md
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
