name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  rs-guard-review:
    name: rs-guard Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download rs-guard
        run: |
          curl -L -o rs-guard \
            https://github.com/nebulaideas/rs-guard/releases/latest/download/rs-guard
          chmod +x rs-guard

      # rs-guard fetches the PR diff internally via the GitHub API using
      # GITHUB_TOKEN, PR_NUMBER, and REPO_FULL_NAME.  No separate `gh pr diff`
      # step is needed.  Alternatively, if you already have a diff file
      # (e.g. from `git diff`), pass --diff-file /path/to/diff.patch to
      # skip the API call entirely.
      - name: Run rs-guard review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: ./rs-guard

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-result
          path: review-result.txt
