name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Only run one review per PR at a time.
# New pushes cancel in-progress reviews so the latest commit is always reviewed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip draft PRs to avoid wasting tokens on work-in-progress.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Download the latest rs-guard release.
      # Pin to a specific version for reproducibility in production.
      # SECURITY: Verify the SHA-256 checksum against the release's
      # `*.sha256` file. The verification step warns (but does not fail)
      # if the checksums file is missing — useful until the project
      # publishes signed release artifacts.
      - name: Download rs-guard
        run: |
          set -euo pipefail
          curl -L --fail -o rs-guard-x86_64-unknown-linux-gnu \
            https://github.com/nebulaideas/rs-guard/releases/latest/download/rs-guard-x86_64-unknown-linux-gnu
          # Optional integrity check — downloads rs-guard-x86_64-unknown-linux-gnu.sha256 if present.
          if curl -fsSL -o rs-guard-x86_64-unknown-linux-gnu.sha256 \
              https://github.com/nebulaideas/rs-guard/releases/latest/download/rs-guard-x86_64-unknown-linux-gnu.sha256; then
            sha256sum -c rs-guard-x86_64-unknown-linux-gnu.sha256
          else
            echo "::warning::No .sha256 file published for this release; skipping integrity check."
          fi
          chmod +x rs-guard-x86_64-unknown-linux-gnu
          mv rs-guard-x86_64-unknown-linux-gnu rs-guard

      # Run the AI code review.
      # The tool reads the diff from the PR, sends it to the configured LLM,
      # parses the structured verdict, and posts the review back to GitHub.
      - name: AI Code Review
        run: ./rs-guard
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
