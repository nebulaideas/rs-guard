name: AI Code Review (React + Vite)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Only review PRs that touch frontend code.
    # NOTE: GitHub Actions path filters use minimatch, which does NOT support
    # brace expansion. Each glob must be a separate pattern.
    paths:
      - 'src/**'
      - 'components/**'
      - 'pages/**'
      - 'hooks/**'
      - 'styles/**'
      - '*.config.ts'
      - '*.config.js'
      - '*.config.mjs'
      - 'tsconfig*.json'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'package*.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Download the latest rs-guard release and verify its SHA-256.
      # The integrity check warns (but does not fail) if the checksums
      # file is missing from the release.
      - name: Download rs-guard
        run: |
          set -euo pipefail
          curl -L --fail -o rs-guard-x86_64-unknown-linux-gnu \
            https://github.com/nebulaideas/rs-guard/releases/latest/download/rs-guard-x86_64-unknown-linux-gnu
          if curl -fsSL -o rs-guard-x86_64-unknown-linux-gnu.sha256 \
              https://github.com/nebulaideas/rs-guard/releases/latest/download/rs-guard-x86_64-unknown-linux-gnu.sha256; then
            sha256sum -c rs-guard-x86_64-unknown-linux-gnu.sha256
          else
            echo "::warning::No .sha256 file published for this release; skipping integrity check."
          fi
          chmod +x rs-guard-x86_64-unknown-linux-gnu
          mv rs-guard-x86_64-unknown-linux-gnu rs-guard

      # Use a frontend-specific prompt for React/Vite context.
      - name: AI Code Review
        run: ./rs-guard --prompt-file .github/frontend-review-prompt.md
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
