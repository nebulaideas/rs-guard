name: AI Code Review (React + Vite)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Only review PRs that touch frontend code.
    paths:
      - 'src/**'
      - 'components/**'
      - 'pages/**'
      - 'hooks/**'
      - 'styles/**'
      - '*.config.{ts,js,mjs}'
      - 'package*.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download rs-guard
        run: |
          curl -L -o rs-guard \
            https://github.com/nebulaideas/rs-guard/releases/latest/download/rs-guard-x86_64-unknown-linux-gnu
          chmod +x rs-guard

      # Use a frontend-specific prompt for React/Vite context.
      - name: AI Code Review
        run: ./rs-guard --prompt-file .github/frontend-review-prompt.md
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
