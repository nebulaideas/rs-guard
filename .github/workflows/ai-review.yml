name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rs-guard-review:
    name: rs-guard Review
    runs-on: ubuntu-latest
    # Skip fork PRs: they cannot access secrets and running untrusted code
    # with write permissions is a security risk.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout base branch (trusted code)
        # Pinned from actions/checkout@v5 (93cb6efe) to avoid Node.js 20 deprecation.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      # Download rs-guard v1.0.2 and verify its SHA-256.
      - name: Download rs-guard
        run: |
          set -euo pipefail
          VERSION="v1.0.2"
          BINARY="rs-guard-x86_64-unknown-linux-gnu"
          curl -L --fail -o "${BINARY}" \
            "https://github.com/nebulaideas/rs-guard/releases/download/${VERSION}/${BINARY}"
          curl -L --fail -o "${BINARY}.sha256" \
            "https://github.com/nebulaideas/rs-guard/releases/download/${VERSION}/${BINARY}.sha256"
          sha256sum -c "${BINARY}.sha256"
          chmod +x "${BINARY}"
          mv "${BINARY}" rs-guard

      - name: Run rs-guard review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          GITHUB_ACTIONS: "true"
        run: ./rs-guard

      - name: Upload review artifact
        if: always()
        # Pinned from actions/upload-artifact@v5 (330a01c4) to avoid Node.js 20 deprecation.
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: review-result-${{ github.event.pull_request.number }}
          path: review-result.txt
          if-no-files-found: ignore
