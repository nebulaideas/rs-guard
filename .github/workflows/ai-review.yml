name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rs-guard-review:
    name: rs-guard Review
    runs-on: ubuntu-latest
    # Skip fork PRs: they cannot access secrets and running untrusted code
    # with write permissions is a security risk.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout base branch (trusted code)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ai-review-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rs-guard from base branch
        run: cargo build --release
        id: build

      - name: Fetch PR diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.patch
        id: fetch-diff

      - name: Run rs-guard review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          GITHUB_ACTIONS: "true"
        run: cargo run --release --quiet

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-result-${{ github.event.pull_request.number }}
          path: review-result.txt
          if-no-files-found: ignore
